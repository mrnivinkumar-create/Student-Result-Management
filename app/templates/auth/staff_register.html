{% extends 'base.html' %}
{% block title %}Staff Registration{% endblock %}
{% block content %}
<section class="card auth-card">
    <h2><i class="fa-solid fa-user-tie"></i> Create Staff Account</h2>
    <form method="post" class="form-grid">
        <label>Full Name<input name="full_name" required placeholder="Enter your full name" /></label>
        <label>Username<input name="username" required placeholder="Choose a username" /></label>
        <label>Password<input type="password" name="password" required placeholder="Choose a password" /></label>
        <button class="btn accent" type="submit"><i class="fa-solid fa-user-plus"></i> Create Account</button>
    </form>
</section>
{% endblock %}
