{% extends 'base.html' %}
{% block title %}Student Registration{% endblock %}
{% block content %}
<section class="card auth-card">
    <h2><i class="fa-solid fa-user-graduate"></i> Create Student Account</h2>
    <form method="post" class="form-grid">
        <label>Full Name<input name="full_name" required placeholder="Enter your full name" /></label>
        <label>Roll Number<input name="roll_number" required placeholder="Enter roll number" /></label>
        <label>Phone Number<input name="phone_number" required maxlength="15"
                placeholder="Enter phone number" /></label>
        <label>Department
            <select name="department_id" required>
                <option value="">Select Department</option>
                {% for dept in departments %}
                <option value="{{ dept.id }}">{{ dept.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Year
            <select name="year" required>
                <option value="1">First Year</option>
                <option value="2">Second Year</option>
                <option value="3">Final Year</option>
            </select>
        </label>
        <button class="btn primary" type="submit"><i class="fa-solid fa-user-plus"></i> Create Account</button>
    </form>
</section>
{% endblock %}
